name: Build and push akaunting image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

run-name: Build akaunting ${{ github.ref_name }}

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Remove 'v' prefix if present (e.g., v1.2.3 -> 1.2.3)
            VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Version: $VERSION"
          else
            # For workflow_dispatch or other triggers, use ref name or commit SHA
            VERSION="${{ github.ref_name }}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Version (from ref): $VERSION"
          fi

      - name: Build and push akaunting image (both tags)
        run: |
          docker buildx build \
            --file ./Dockerfile \
            --tag ghcr.io/${{ github.repository_owner }}/akaunting:${{ steps.version.outputs.version }} \
            --tag ghcr.io/${{ github.repository_owner }}/akaunting:latest \
            --push \
            .
